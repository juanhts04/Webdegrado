<div class="layout">
	<aside class="sidebar" aria-label="Menú lateral">
		<nav class="nav" aria-label="Navegación principal">
			@for (item of menuItems; track item.key) {
				<button
					class="nav-item"
					type="button"
					[class.is-active]="activeKey() === item.key"
					[attr.aria-current]="activeKey() === item.key ? 'page' : null"
					(click)="selectItem(item.key)"
				>
					<span class="icon" aria-hidden="true">
						@switch (item.icon) {
							@case ('calendar') {
								<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
									<rect x="3" y="4" width="18" height="18" rx="3"></rect>
									<path d="M16 2v4M8 2v4M3 10h18"></path>
								</svg>
							}
							@case ('user-plus') {
								<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
									<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
									<circle cx="9" cy="7" r="4"></circle>
									<path d="M19 8v6M22 11h-6"></path>
								</svg>
							}
							@case ('book') {
								<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
									<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
									<path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
								</svg>
							}
							@case ('users') {
								<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
									<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
									<circle cx="9" cy="7" r="4"></circle>
									<path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
									<path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
								</svg>
							}
							@case ('id') {
								<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
									<rect x="3" y="4" width="18" height="16" rx="3"></rect>
									<path d="M7 8h6M7 12h10M7 16h7"></path>
								</svg>
							}
							@case ('list') {
								<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
									<path d="M8 6h13M8 12h13M8 18h13"></path>
									<path d="M3 6h.01M3 12h.01M3 18h.01"></path>
								</svg>
							}
							@case ('file') {
								<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
									<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
									<path d="M14 2v6h6"></path>
									<path d="M16 13H8M16 17H8M10 9H8"></path>
								</svg>
							}
							@case ('settings') {
								<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
									<path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"></path>
									<path d="M19.4 15a1.7 1.7 0 0 0 .33 1.87l.04.04a2 2 0 0 1-1.42 3.41 2 2 0 0 1-1.41-.59l-.04-.04A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .3 1.7 1.7 0 0 0-.87 1.47V21a2 2 0 0 1-4 0v-.06a1.7 1.7 0 0 0-.87-1.47 1.7 1.7 0 0 0-1-.3 1.7 1.7 0 0 0-1.87.33l-.04.04a2 2 0 0 1-2.83-2.83l.04-.04A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.3-1 1.7 1.7 0 0 0-1.47-.87H2a2 2 0 0 1 0-4h.06a1.7 1.7 0 0 0 1.47-.87 1.7 1.7 0 0 0 .3-1 1.7 1.7 0 0 0-.33-1.87l-.04-.04A2 2 0 0 1 5.88 2.8l.04.04A1.7 1.7 0 0 0 7 4.6c.31 0 .69-.11 1-.3a1.7 1.7 0 0 0 .87-1.47V2a2 2 0 0 1 4 0v.06c0 .62.34 1.19.87 1.47.31.19.69.3 1 .3.7 0 1.35-.25 1.87-.68l.04-.04A2 2 0 0 1 21.2 5.88l-.04.04c-.43.52-.68 1.17-.68 1.87 0 .31.11.69.3 1 .28.53.85.87 1.47.87H22a2 2 0 0 1 0 4h-.06a1.7 1.7 0 0 0-1.47.87c-.19.31-.3.69-.3 1z"></path>
								</svg>
							}
							@case ('clock') {
								<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
									<circle cx="12" cy="12" r="10"></circle>
									<path d="M12 6v6l4 2"></path>
								</svg>
							}
							@case ('building') {
								<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
									<path d="M3 21h18"></path>
									<path d="M5 21V7l8-4v18"></path>
									<path d="M19 21V11l-6-4"></path>
									<path d="M9 9v.01M9 13v.01M9 17v.01"></path>
								</svg>
							}
							@default {
								<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
									<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
									<circle cx="12" cy="7" r="4"></circle>
								</svg>
							}
						}
					</span>
					<span class="label">{{ item.label }}</span>
				</button>
			}
		</nav>

		<div class="sidebar-bottom">
			<div class="profile" aria-label="Perfil">
				<div class="avatar" aria-hidden="true">{{ initials() }}</div>
				<div class="profile-text">
					<div class="name">{{ displayName() }}</div>
					<div class="role">{{ displayRole() }}</div>
				</div>
			</div>

			<button class="logout" type="button" (click)="logout()">Cerrar sesión</button>
		</div>
	</aside>

	<main class="content" aria-label="Contenido">
		@if (isHome()) {
			<h1 class="title">{{ activeLabel() }}</h1>
			<p class="hint">Selecciona una opción del menú.</p>
		}
		<router-outlet />
	</main>
</div>
