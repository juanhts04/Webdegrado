<div class="login-page">
  <main class="login-card" aria-labelledby="loginTitle">
    <div class="brand">
      <img
        class="brand-logo"
        ngSrc="assets/img/logo.png"
        width="220"
        height="220"
        alt="Universidad del Pacífico"
        priority
      />
    </div>

    <h1 id="loginTitle" class="sr-only">Iniciar sesión</h1>

    <form class="form" (ngSubmit)="login()" #form="ngForm">
      <div class="field">
        <input
          type="text"
          [(ngModel)]="loginData.correo"
          name="correo"
          placeholder="Usuario"
          autocomplete="username"
          required
          aria-label="Usuario"
        />
      </div>

      <div class="field">
        <input
          type="password"
          [(ngModel)]="loginData.contrasena"
          name="contrasena"
          placeholder="Contraseña"
          autocomplete="current-password"
          required
          aria-label="Contraseña"
        />
      </div>

      <button class="btn-primary" type="submit">Acceder</button>

      <button class="btn-link" type="button" (click)="olvidoContrasena()">
        ¿Olvidó su contraseña?
      </button>
    </form>

    <hr class="divider" aria-hidden="true" />

  </main>
</div>
