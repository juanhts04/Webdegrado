<div class="main-container">

  <!-- Sección Superior: Logo y Títulos -->
  <div class="header-section">
    <div class="logo-container">
      <div class="logo-placeholder">
        <img src="assets/img/logo.png" alt="Logo" class="logo-img" />
        <div class="logo-text">
          <span class="text-blue">UNIVERSIDAD</span>
          <span class="text-green">DEL PACÍFICO</span>
        </div>
      </div>
    </div>

    <div class="title-container">
      <h1>Iniciar sesión</h1>
      <p>Ingresa tu usuario y contraseña</p>
    </div>
  </div>

  <!-- Sección Inferior: Formulario -->
  <div class="green-form-container">
    <div class="form-content">

      <form (ngSubmit)="login()">

        <!-- Usuario -->
        <div class="input-group">
          <label class="custom-label">Usuario</label>
          <input
            type="text"
            [(ngModel)]="loginData.correo"
            name="correo"
            placeholder="Ingresa tu usuario"
            class="custom-input"
          />
        </div>

        <!-- Contraseña -->
        <div class="input-group">
          <label class="custom-label">Contraseña</label>
          <input
            type="password"
            [(ngModel)]="loginData.contrasena"
            name="contrasena"
            placeholder="●●●●●●●●"
            class="custom-input"
          />
        </div>

        <!-- Botón Iniciar Sesión -->
        <button type="submit" class="btn-login">
          Iniciar sesión
        </button>

      </form>

      <!-- Botón Registrarse -->
      <button
        class="btn-register"
        routerLink="/registrar-usuario">
        Registrarse
      </button>

    </div>
  </div>

</div>
